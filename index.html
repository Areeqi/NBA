<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>النخبة – لوحة التحكم الأسطورية</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Readex+Pro:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />

    <!-- Chart.js للرسم البياني -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <style>
        /* ===== تنسيقات القائمة الجانبية للجوال ===== */
        .mobile-sidebar {
            position: fixed;
            top: 0;
            right: -100%;
            width: 80%;
            max-width: 320px;
            height: 100vh;
            background: var(--panel-bg);
            backdrop-filter: blur(24px);
            border-left: 1px solid var(--panel-border);
            z-index: 5000;
            padding: 1.5rem;
            transition: right 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: var(--shadow-xl);
            overflow-y: auto;
        }
        .mobile-sidebar.open {
            right: 0;
        }
        .mobile-sidebar-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            z-index: 4000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .mobile-sidebar-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        .menu-toggle-btn {
            display: none;
            background: transparent;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
            color: var(--text);
        }
        @media (max-width: 768px) {
            .menu-toggle-btn { display: block; }
            .admin-tabs { display: none; }
            .mobile-sidebar .admin-tabs {
                display: flex;
                flex-direction: column;
                gap: 0.5rem;
                margin-top: 2rem;
            }
            .mobile-sidebar .admin-tabs button {
                text-align: right;
                width: 100%;
                justify-content: flex-start;
            }
        }

        /* ===== تحسينات الجدول ===== */
        .product-table-wrap th {
            cursor: pointer;
            user-select: none;
            position: relative;
        }
        .product-table-wrap th:hover {
            background: var(--primary-dark);
        }
        .product-table-wrap th .sort-icon {
            margin-right: 4px;
            font-size: 0.7rem;
            opacity: 0.5;
        }
        .product-table-wrap th.sorted .sort-icon {
            opacity: 1;
            color: #ffd700;
        }

        /* ===== قسم الرسم البياني ===== */
        .chart-container {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            border-radius: var(--radius-lg);
            padding: 1rem;
            margin-bottom: 1.5rem;
            border: 1px solid var(--panel-border);
            max-width: 100%;
            height: 350px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 0.8rem;
            margin-bottom: 1.5rem;
        }
        .stat-card {
            background: rgba(18, 18, 32, 0.2);
            backdrop-filter: blur(12px);
            border-radius: var(--radius-lg);
            padding: 0.8rem 1rem;
            border: 1px solid rgba(255,255,255,0.03);
            box-shadow: var(--shadow-sm);
            border-right: 4px solid var(--primary);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        [data-theme="light"] .stat-card { background: rgba(255,255,255,0.15); }
        .stat-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }
        .stat-card .stat-number { font-size: 1.6rem; font-weight: 800; color: var(--primary); }
        .stat-card .stat-label { font-size: 0.75rem; color: rgba(var(--text-rgb),0.3); margin-top: 0.1rem; }
    </style>
</head>
<body>

<!-- زر القائمة الجانبية (يظهر في الجوال) -->
<button class="menu-toggle-btn" id="menuToggleBtn" style="position:fixed; top:1rem; right:1rem; z-index:3000;">☰</button>

<!-- القائمة الجانبية للجوال -->
<div class="mobile-sidebar-overlay" id="mobileSidebarOverlay"></div>
<div class="mobile-sidebar" id="mobileSidebar">
    <div style="display:flex;justify-content:space-between;align-items:center;">
        <strong style="font-size:1.2rem;">⚡ القائمة</strong>
        <button id="closeSidebarBtn" style="background:none;border:none;font-size:1.5rem;cursor:pointer;color:var(--text);">✕</button>
    </div>
    <div class="admin-tabs" id="mobileAdminTabs">
        <button class="active" data-tab="products">📦 المنتجات</button>
        <button data-tab="blog">📝 المدونة</button>
        <button data-tab="contact">📞 التواصل</button>
        <button data-tab="settings">⚙️ الإعدادات</button>
        <button data-tab="marketing">📈 أدوات البيع</button>
    </div>
</div>

<!-- الهيدر -->
<header id="mainHeader">
    <div class="logo">⚡ النخبة – الإدارة</div>
    <div class="header-actions">
        <button id="themeToggle" aria-label="تبديل الثيم">🌙</button>
        <a href="index.html" style="color:var(--text);text-decoration:none;font-size:1.1rem;margin-left:0.5rem;opacity:0.7;transition:0.3s;">🛍️ المتجر</a>
    </div>
</header>

<main class="admin-panel">
    <h2>📊 لوحة التحكم الأسطورية</h2>

    <!-- التبويبات (تظهر في الشاشات الكبيرة) -->
    <div class="admin-tabs" id="desktopAdminTabs">
        <button class="active" data-tab="products">📦 المنتجات</button>
        <button data-tab="blog">📝 المدونة</button>
        <button data-tab="contact">📞 التواصل</button>
        <button data-tab="settings">⚙️ الإعدادات</button>
        <button data-tab="marketing">📈 أدوات البيع</button>
    </div>

    <!-- تبويب المنتجات -->
    <div id="tab-products" class="tab-content active">
        <!-- الرسم البياني للمبيعات -->
        <div class="chart-container">
            <canvas id="salesChart"></canvas>
        </div>

        <div class="stats-grid" id="statsGrid">
            <div class="stat-card"><span class="stat-number" id="statProducts">0</span><span class="stat-label">📦 المنتجات</span></div>
            <div class="stat-card"><span class="stat-number" id="statOrders">0</span><span class="stat-label">📋 الطلبات</span></div>
            <div class="stat-card success"><span class="stat-number" id="statRevenue">0</span><span class="stat-label">💰 الإيرادات</span></div>
            <div class="stat-card danger"><span class="stat-number" id="statLowStock">0</span><span class="stat-label">⚠️ مخزون منخفض</span></div>
        </div>

        <div class="admin-actions">
            <button id="addProductBtn">➕ إضافة منتج</button>
            <button id="manageCategoriesBtn">📂 الفئات</button>
            <button id="exportBtn">📥 تصدير</button>
            <button id="importBtn">📤 استيراد</button>
            <input type="file" id="importFileInput" accept=".json" style="display:none;" />
            <button id="refreshStatsBtn" class="secondary-btn">🔄 تحديث</button>
        </div>

        <div class="product-table-wrap">
            <table>
                <thead>
                    <tr>
                        <th data-sort="id"># <span class="sort-icon">↕</span></th>
                        <th>صورة</th>
                        <th data-sort="name">الاسم <span class="sort-icon">↕</span></th>
                        <th data-sort="category">الفئة <span class="sort-icon">↕</span></th>
                        <th data-sort="price">السعر <span class="sort-icon">↕</span></th>
                        <th>السعر القديم</th>
                        <th data-sort="stock">المخزون <span class="sort-icon">↕</span></th>
                        <th>الحد الأدنى</th>
                        <th data-sort="rating">التقييم <span class="sort-icon">↕</span></th>
                        <th>المقاسات</th>
                        <th>الاستيكرات</th>
                        <th>الحالة</th>
                        <th data-sort="sortOrder">الترتيب <span class="sort-icon">↕</span></th>
                        <th>إجراءات</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <!-- باقي التبويبات (مدونة، تواصل، إعدادات، تسويق) تبقى كما هي في النسخة السابقة -->
    <div id="tab-blog" class="tab-content"> ... </div>
    <div id="tab-contact" class="tab-content"> ... </div>
    <div id="tab-settings" class="tab-content"> ... </div>
    <div id="tab-marketing" class="tab-content"> ... </div>
</main>

<div id="toast" class="toast"></div>

<script type="module">
    import { 
        ProductManager, BlogManager, ContactManager,
        CategoryManager, HeroImagesManager, ImageUploader,
        showToast, getOrders, getTheme, setTheme,
        getBackground, setBackground, applyBackground,
        getFooterImage, setFooterImage, applyFooterImage,
        getSalesSettings, saveSalesSettings, getDefaultSalesSettings,
        getCommunityStats
    } from './main.js';

    // ---------- عناصر DOM ----------
    const $ = id => document.getElementById(id);
    const tableBody = $('tableBody');
    const desktopTabs = $('desktopAdminTabs');
    const mobileTabs = $('mobileAdminTabs');
    const menuToggleBtn = $('menuToggleBtn');
    const mobileSidebar = $('mobileSidebar');
    const mobileSidebarOverlay = $('mobileSidebarOverlay');
    const closeSidebarBtn = $('closeSidebarBtn');
    const themeToggle = $('themeToggle');

    let allProducts = [];
    let sortColumn = 'sortOrder';
    let sortDirection = 'asc';

    // ---------- القائمة الجانبية للجوال ----------
    function openSidebar() {
        mobileSidebar.classList.add('open');
        mobileSidebarOverlay.classList.add('active');
    }
    function closeSidebar() {
        mobileSidebar.classList.remove('open');
        mobileSidebarOverlay.classList.remove('active');
    }
    menuToggleBtn.addEventListener('click', openSidebar);
    closeSidebarBtn.addEventListener('click', closeSidebar);
    mobileSidebarOverlay.addEventListener('click', closeSidebar);

    // مزامنة التبويبات بين سطح المكتب والجوال
    function syncTabs(activeTab) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.getElementById('tab-' + activeTab).classList.add('active');
        
        [desktopTabs, mobileTabs].forEach(tabs => {
            if (tabs) {
                tabs.querySelectorAll('button').forEach(b => {
                    b.classList.toggle('active', b.dataset.tab === activeTab);
                });
            }
        });
        if (window.innerWidth < 768) closeSidebar();
    }

    [desktopTabs, mobileTabs].forEach(tabs => {
        if (tabs) {
            tabs.addEventListener('click', (e) => {
                const btn = e.target.closest('button');
                if (!btn) return;
                syncTabs(btn.dataset.tab);
                if (btn.dataset.tab === 'blog') renderBlogPosts();
                if (btn.dataset.tab === 'contact') loadContactInfo();
                if (btn.dataset.tab === 'marketing') loadMarketingSettings();
            });
        }
    });

    // ---------- الثيم ----------
    function applyTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('nokhba_theme', theme);
        if (themeToggle) {
            const icons = { dark: '🌙', light: '☀️', sunshine: '🌤️' };
            themeToggle.textContent = icons[theme] || '🌓';
        }
    }
    themeToggle.addEventListener('click', () => {
        const current = getTheme();
        const themes = ['dark', 'light', 'sunshine'];
        const next = themes[(themes.indexOf(current) + 1) % themes.length];
        applyTheme(next);
    });
    applyTheme(getTheme());

    // ---------- مدير المنتجات ----------
    const productManager = new ProductManager();
    const blogManager = new BlogManager();
    const contactManager = new ContactManager();

    // رسم بياني للمبيعات
    let salesChart = null;
    function renderSalesChart() {
        const orders = getOrders();
        const monthlyData = {};
        orders.forEach(order => {
            const date = new Date(order.date);
            const key = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}`;
            monthlyData[key] = (monthlyData[key] || 0) + (order.total || 0);
        });
        const sortedKeys = Object.keys(monthlyData).sort();
        const labels = sortedKeys.map(k => {
            const [y,m] = k.split('-');
            return `${m}/${y}`;
        });
        const values = sortedKeys.map(k => monthlyData[k]);

        const ctx = document.getElementById('salesChart');
        if (!ctx) return;
        if (salesChart) salesChart.destroy();
        salesChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels.length ? labels : ['لا توجد بيانات'],
                datasets: [{
                    label: 'الإيرادات (ريال)',
                    data: values.length ? values : [0],
                    borderColor: '#4f46e5',
                    backgroundColor: 'rgba(79,70,229,0.1)',
                    fill: true,
                    tension: 0.4,
                    pointBackgroundColor: '#4f46e5'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { labels: { color: 'var(--text)' } }
                },
                scales: {
                    x: { ticks: { color: 'var(--text)' } },
                    y: { ticks: { color: 'var(--text)', callback: v => v + ' ر.س' } }
                }
            }
        });
    }

    // تحديث الإحصائيات
    async function updateStats() {
        const products = await productManager.getAll(true);
        const orders = getOrders();
        const totalRevenue = orders.reduce((s,o) => s + (o.total||0), 0);
        let lowStock = 0;
        products.forEach(p => {
            const minStock = p.variants?.length ? Math.min(...p.variants.map(v=>v.stock)) : p.stock;
            if (minStock < 10 && p.active !== false) lowStock++;
        });
        $('statProducts').textContent = products.length;
        $('statOrders').textContent = orders.length;
        $('statRevenue').textContent = totalRevenue.toFixed(2) + ' ريال';
        $('statLowStock').textContent = lowStock;
        renderSalesChart();
    }

    // فرز الجدول
    function sortProducts(column) {
        if (sortColumn === column) {
            sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
        } else {
            sortColumn = column;
            sortDirection = 'asc';
        }
        const sorted = [...allProducts].sort((a,b) => {
            let valA = a[column];
            let valB = b[column];
            if (typeof valA === 'string') valA = valA.toLowerCase();
            if (typeof valB === 'string') valB = valB.toLowerCase();
            if (valA < valB) return sortDirection === 'asc' ? -1 : 1;
            if (valA > valB) return sortDirection === 'asc' ? 1 : -1;
            return 0;
        });
        renderTableBody(sorted);
        updateSortIcons();
    }

    function updateSortIcons() {
        document.querySelectorAll('.product-table-wrap th[data-sort]').forEach(th => {
            th.classList.toggle('sorted', th.dataset.sort === sortColumn);
        });
    }

    async function loadAllProducts() {
        allProducts = await productManager.getAll(true);
        sortProducts(sortColumn);
    }

    function renderTableBody(products) {
        tableBody.innerHTML = products.map(p => {
            const status = p.active !== false ? 'نشط' : 'موقف';
            const tags = [];
            if (p.isNew) tags.push('<span class="badge-status new">🆕 جديد</span>');
            if (p.isBestSeller) tags.push('<span class="badge-status bestseller">⭐ الأكثر مبيعاً</span>');
            if (!tags.length) tags.push('<span>—</span>');
            const displayPrice = p.variants?.length ? 'متعدد' : p.price.toFixed(2);
            const displayStock = p.variants?.length ? p.variants.reduce((s,v)=>s+v.stock,0) : p.stock;
            const stars = '⭐'.repeat(Math.floor(p.rating||0));
            return `
                <tr>
                    <td>${p.id.slice(0,4)}</td>
                    <td><img src="${p.image||'/public/images/products/1.jpg'}" width="32" /></td>
                    <td>${p.name}</td>
                    <td>${p.category||'—'}</td>
                    <td>${displayPrice}</td>
                    <td>${p.oldPrice ? p.oldPrice.toFixed(2) : '—'}</td>
                    <td>${displayStock}</td>
                    <td>${p.minOrder||1}</td>
                    <td>${stars||'—'}</td>
                    <td>${p.variants?.map(v=>v.size).join(',')||'—'}</td>
                    <td>${tags.join(' ')}</td>
                    <td><span class="badge-status ${p.active!==false?'active':'inactive'}">${status}</span></td>
                    <td>${p.sortOrder||0}</td>
                    <td>
                        <button class="btn-edit" data-id="${p.id}">✏️</button>
                        <button class="btn-delete" data-id="${p.id}">🗑️</button>
                    </td>
                </tr>
            `;
        }).join('');
        bindRowEvents();
    }

    function bindRowEvents() {
        tableBody.querySelectorAll('.btn-edit').forEach(b => b.addEventListener('click', () => openModal(b.dataset.id)));
        tableBody.querySelectorAll('.btn-delete').forEach(b => b.addEventListener('click', async () => {
            if (confirm('حذف المنتج؟')) {
                await productManager.mutate({ type:'DELETE', payload:{id:b.dataset.id} });
                loadAllProducts();
                updateStats();
                showToast('🗑️ تم الحذف');
            }
        }));
    }

    // ربط أحداث الفرز
    document.querySelectorAll('.product-table-wrap th[data-sort]').forEach(th => {
        th.addEventListener('click', () => sortProducts(th.dataset.sort));
    });

    // عرض مودال المنتج (يحتوي على oldPrice و maxStock)
    async function openModal(id=null) {
        $('productModal').classList.add('active');
        await refreshCategorySelect();
        if (id) {
            const p = await productManager.getById(id);
            if (!p) return;
            $('productId').value = p.id;
            $('pName').value = p.name||'';
            $('pPrice').value = p.price||0;
            $('pOldPrice').value = p.oldPrice||0;
            $('pStock').value = p.stock||0;
            $('pMaxStock').value = p.maxStock||p.stock||100;
            $('pMinOrder').value = p.minOrder||1;
            $('pRating').value = p.rating||0;
            $('pSortOrder').value = p.sortOrder||0;
            $('pStatus').value = p.active!==false?'active':'inactive';
            $('pIsNew').checked = !!p.isNew;
            $('pIsBestSeller').checked = !!p.isBestSeller;
            $('pDesc').value = p.desc||'';
            $('pImage').value = p.image||'';
            $('pImages').value = (p.images||[]).join(',');
            $('pVideo').value = p.video||'';
            loadVariants(p.variants||[]);
        } else {
            $('productForm').reset();
            $('productId').value = '';
            $('pMinOrder').value = 1;
            $('pStatus').value = 'active';
            variantsContainer.innerHTML = '';
        }
    }

    // ... (باقي الدوال مثل المدونة، التواصل، التسويق موجودة في النسخة السابقة)
    // يجب تضمينها بشكل كامل لضمان عمل جميع التبويبات.

    // بدء التشغيل
    loadAllProducts();
    updateStats();
    // ... استدعاء دوال المدونة والتواصل إذا كانت التبويبات ظاهرة
</script>
</body>
</html>
